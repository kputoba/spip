<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SiPEMAN-SPIP KPU Toba</title>
  <link rel="icon" type="image/png" href="https://www.kpu.go.id/images/1627539868logo-kpu.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body { overflow: hidden; background: #7f0000; }

    /* ===== LOADING SCREEN ===== */
    #loading-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s ease;
    }

    #loading-screen::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: url('https://raw.githubusercontent.com/kputoba/spip/main/kputobakantor.jpeg');
      background-size: cover;
      background-position: center top;
      z-index: 0;
    }

    #loading-screen::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(160deg, rgba(127,0,0,0.88) 0%, rgba(183,28,28,0.85) 40%, rgba(198,40,40,0.88) 100%);
      z-index: 1;
    }

    .loading-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    /* Logo */
    .loading-logo {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
      animation: pulse 2s ease-in-out infinite;
    }

    .loading-logo img {
      width: 50px;
      height: 50px;
      object-fit: contain;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
      50% { transform: scale(1.05); box-shadow: 0 6px 32px rgba(0,0,0,0.4); }
    }

    /* Teks */
    .loading-title {
      color: white;
      font-family: 'Segoe UI', sans-serif;
      font-size: 18px;
      font-weight: 700;
      text-align: center;
      letter-spacing: 0.02em;
    }

    .loading-sub {
      color: rgba(255,255,255,0.6);
      font-family: 'Segoe UI', sans-serif;
      font-size: 12px;
      text-align: center;
      margin-top: -14px;
    }

    /* Spinner lingkaran */
    .spinner {
      width: 44px;
      height: 44px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Dot loading */
    .loading-dots {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .loading-dots span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
      animation: dotBounce 1.2s ease-in-out infinite;
    }

    .loading-dots span:nth-child(1) { animation-delay: 0s; }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dotBounce {
      0%, 80%, 100% { transform: scale(0.6); background: rgba(255,255,255,0.3); }
      40% { transform: scale(1); background: white; }
    }

    /* Progress bar */
    .progress-bar-wrap {
      width: 180px;
      height: 3px;
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: white;
      border-radius: 10px;
      animation: progress 2.5s ease-in-out forwards;
    }

    @keyframes progress {
      0%   { width: 0%; }
      30%  { width: 40%; }
      60%  { width: 70%; }
      90%  { width: 90%; }
      100% { width: 100%; }
    }

    .loading-text {
      color: rgba(255,255,255,0.5);
      font-family: 'Segoe UI', sans-serif;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: -10px;
    }

    /* Divider */
    .divider {
      width: 36px;
      height: 2px;
      background: rgba(255,205,210,0.5);
      border-radius: 2px;
    }

    /* ===== IFRAME ===== */
    iframe {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
      z-index: 1;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
  </style>
</head>
<body>

  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loading-content">
      <div class="loading-logo">
        <img src="https://www.kpu.go.id/images/1627539868logo-kpu.png" alt="KPU">
      </div>
      <div class="loading-title">SiPEMAN-SPIP</div>
      <div class="loading-sub">KPU Kabupaten Toba</div>
      <div class="divider"></div>
      <div class="loading-dots">
        <span></span><span></span><span></span>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar"></div>
      </div>
      <div class="loading-text">Memuat sistem...</div>
    </div>
  </div>

  <!-- Main iframe -->
  <iframe
    id="mainFrame"
    src="https://script.google.com/macros/s/AKfycbwo1GpTF6jxKnNHacgN8Dn24IKbcM8bW_CK9Lm53R58d4mz4pdDtwuthR3lfJ-00cC3/exec?page=landing"
    allowfullscreen>
  </iframe>

  <script>
    var params = new URLSearchParams(window.location.search);
    if (params.get('goto') === 'dashboard') {
      document.getElementById('mainFrame').src =
        'https://script.google.com/macros/s/AKfycbwo1GpTF6jxKnNHacgN8Dn24IKbcM8bW_CK9Lm53R58d4mz4pdDtwuthR3lfJ-00cC3/exec?page=dashboard';
    }

    var frame = document.getElementById('mainFrame');
    var loader = document.getElementById('loading-screen');

    // Sembunyikan loading saat iframe selesai load
    frame.addEventListener('load', function() {
      setTimeout(function() {
        frame.style.opacity = '1';
        loader.style.opacity = '0';
        setTimeout(function() {
          loader.style.display = 'none';
        }, 500);
      }, 400);
    });

    // Tampilkan loading lagi saat navigasi dalam iframe
    window.addEventListener('message', function(e) {
      if (e.data === 'goto-dashboard') {
        // Tampilkan loading
        loader.style.display = 'flex';
        loader.style.opacity = '1';
        frame.style.opacity = '0';

        // Reset progress bar
        var bar = loader.querySelector('.progress-bar');
        bar.style.animation = 'none';
        bar.offsetHeight; // reflow
        bar.style.animation = 'progress 2.5s ease-in-out forwards';

        loader.querySelector('.loading-text').textContent = 'Membuka dashboard...';

        frame.src =
          'https://script.google.com/macros/s/AKfycbwo1GpTF6jxKnNHacgN8Dn24IKbcM8bW_CK9Lm53R58d4mz4pdDtwuthR3lfJ-00cC3/exec?page=dashboard';
      }
    });
  </script>
</body>
</html>
